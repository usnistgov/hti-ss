 <div ng-if="loading" style="text-align:center">
    <i class="fa fa-circle-o-notch fa-spin fa-2x"></i>
  </div>
  <div ng-if="!loading">
    <div ng-if="error === null">
      <div class="col-md-12" style="margin-bottom:10px" ng-if="(sectionType !== 'app' && hasWriteAccess()) || (sectionType === 'app' && isAdmin())">
      <span class="pull-right">
        <button ng-click="addDocument()" class="btn btn-sm btn-success"><i class="fa fa-plus"></i>Add Document</button>
      </span>
      </div>

      <div ng-if="docs.length > 0 || docsDocker.length > 0">
        <div class="col-md-12">
			<table class="table table-striped table-bordered table-condensed">
            	<thead>
            		<tr class="tbl-header-1">
              		<th st-ratio="50">Docker files</th>
              		<th st-ratio="50">File Download link</th>             
            </tr>
            </thead>
			<tbody>
 			<tr ng-repeat="doc in docsDocker | orderBy:'position'">
				<td st-ratio="50">{{::doc.title}}</td>
				 <td st-ratio="50">
                <span ng-if="doc.path == null">-</span>
                <span ng-if="doc.path != null">
                    <a class="point" rel="noopener noreferrer" ng-if="isLink(doc.path)" target="_blank"
                       ng-href="{{::doc.path}}">{{::doc.title}}</a>
                    <a class="point"  ng-if="!isLink(doc.path) " ng-click="downloadTool(doc.path)">{{::doc.name}}</a>
					<a class="point" title="Preview document" ng-if=" false || !isLink(doc.path) && doc.path.endsWith('.md')" ng-click="openMarkdownModal(doc)"><i class="fa fa-eye" aria-hidden="true"></i>
					</a>
                    </span>
              </td>				
            </tbody>
          </table>        
        </div>
      </div>
    
    </div>

    <div ng-if="error !== null">
      <div class="alert alert-danger" role="alert" ng-bind="error"></div>
    </div>
  </div>
