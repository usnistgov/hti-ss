

<div id="footer">
  <table>
    <tbody>
    <tr>
      <td class="box" ng-if="appInfo.options.ORGANIZATION_LINK !== 'NA' && appInfo.options.ORGANIZATION_LOGO !== 'NA'">
        <a ng-href="{{appInfo.options.ORGANIZATION_LINK != null && appInfo.options.ORGANIZATION_LINK != ''  ? appInfo.options.ORGANIZATION_LINK : 'http://www.nist.gov'}}" target="_blank" rel="noopener noreferrer"><img class="footerImage" ng-src="{{appInfo.options.ORGANIZATION_LOGO != null && appInfo.options.ORGANIZATION_LOGO != ''? appInfo.options.ORGANIZATION_LOGO : 'images/nist_logo.gif'}}" alt="{{appInfo.options.ORGANIZATION_NAME != null && appInfo.options.ORGANIZATION_NAME != ''  ?  appInfo.options.ORGANIZATION_NAME: 'NIST'}} Logo" title="{{appInfo.options.ORGANIZATION_NAME != null && appInfo.options.ORGANIZATION_NAME != ''  ? appInfo.options.ORGANIZATION_NAME: 'NIST'}} Logo" /></a>
        <!--<a href="http://www.nist.gov" target="_blank"><img class="footerImage" src="images/nist_logo.gif" alt="The NIST Logo" title="The NIST Logo" /></a>-->
      </td>

      <td class="box">
        <div>
          <h5>Application Information</h5>
          <ul>
            <li>Date: {{appInfo.date |  date: 'MM/dd/yyyy' : 'UTC'}} </li>
            <li>Application Version: {{appInfo.version}}</li>
<!--             <li ng-if="domain.rsbVersion != null && domain.rsbVersion != ''">Resource Bundle Version:{{domain.rsbVersion}}</li> -->
<!--             <li ng-if="domain.igVersion != null && domain.igVersion != ''">Ig Version:{{domain.igVersion}}</li> -->
          </ul>
        </div>
      </td>

      <td class="box">
        <div>
          <h5>Supported Browsers</h5>
          <ul>
            <li><i class="fa fa-firefox"></i> Firefox</li>
            <li><i class="fa fa-chrome"></i> Chrome </li>
            <li><i class="fa fa-safari"></i>Safari</li>
            <li><i class="fa fa-edge"></i>Edge</li>
          </ul>
        </div>
      </td>

      <td class="box">
        <div>
          <h5>External Links</h5>
          <ul>
            <li ng-if="appInfo.options.DISCLAIMER_LINK !== 'NA'"><a class="footer-link" ng-href="{{appInfo.options.DISCLAIMER_LINK != null && appInfo.options.DISCLAIMER_LINK !== ''? appInfo.options.DISCLAIMER_LINK : 'http://www.nist.gov/public_affairs/disclaimer.cfm'}}" target="_blank" rel="noopener noreferrer" title="View Disclaimer">Disclaimer</a>
            </li><li ng-if="appInfo.options.PRIVACY_LINK !== 'NA'" ><a class="footer-link" ng-href="{{appInfo.options.PRIVACY_LINK != null && appInfo.options.PRIVACY_LINK != ''  ? appInfo.options.PRIVACY_LINK : 'http://www.nist.gov/public_affairs/privacy.cfm#privpolicy'}}" target="_blank" rel="noopener noreferrer" title="View Privacy Policy">Privacy/Policy</a>
          </li><li ng-if="appInfo.contactEmail != null && appInfo.contactEmail != ''"><a class="footer-link" ng-href="mailto:{{appInfo.contactEmail}}" title="Email Website Administrator @: {{appInfo.contactEmail}}">Website Administrator</a>
          </li></ul>
        </div>
      </td>

      <td class="box">
        <a rel="noopener noreferrer" href="https://www.nist.gov/itl" target="_blank"><img class="footerImage" src="images/itl_logo_new.png" alt="Information Technology Laboratory" title="Information Technology Laboratory" /></a>
      </td>

    </tr>
    </tbody>

  </table>
</div>
