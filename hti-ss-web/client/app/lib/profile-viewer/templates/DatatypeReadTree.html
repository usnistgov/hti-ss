 <tr pv-node ng-show="isDatatypeVisible(node)" is-branch="hasRelevantChild(node)" node="node">
        <td class="col-xs-2 col-fixed-350"
            ng-class="{'name-concise-view concise-view':options.concise, 'expanded-view': !options.concise}">

              <span
                      tooltip-enable="options.concise"
                      tooltip-html="getDatatypeNodeName3(node)" tooltip-append-to-body="true"
                      tooltip-class="constraints-tooltip"
                      tooltip-trigger tooltip-animation="false" tooltip-placement="left">
                                  <span class="label label-datatype label-icon">D</span>
                <a class="point" ng-click="showDataType(node.id)"><b>{{::getDatatypeNodeName2(node)}}</b></a>
                                <span>: {{::getDatatypeNodeDescription3(node)}}</span>

                  </span>



        </td>
        <td class="col-xs-1 col-fixed-80 nodata">
        </td>
        <td class="col-xs-1 col-fixed-100 nodata">
        </td>
        <td class="col-xs-1 col-fixed-80 nodata">
        </td>

        <td class="col-xs-1 col-fixed-150 nodata">
        </td>

        <td class="col-xs-2 col-predicate  nodata" ng-style="predWidth">
        </td>

        <td ng-if="node.selfConformanceStatements.length >0" class="col-xs-4 col-cs" ng-style="csWidth">
			<span class="cs-concise-view concise-view" ng-if="options.concise"
                  tooltip-html="getConfStatementsAsMultipleLinesString(node)"
                  tooltip-append-to-body="true"
                  tooltip-class="constraints-tooltip"
                  ng-bind-html="getConfStatementsAsOneLineString(node)"
                  tooltip-trigger tooltip-animation="false" tooltip-placement="left"></span>
            <span ng-repeat="confStatement in node.selfConformanceStatements"
                  ng-if="!options.concise">
                <span class="expanded-view">
                   {{::confStatement.constraintId}} : {{::confStatement.description}}
                </span>
            </span>
        </td>
		<td ng-if="node.selfConformanceStatements.length == 0" class="col-xs-4 col-cs nodata" ng-style="csWidth"></td>
    </tr>
