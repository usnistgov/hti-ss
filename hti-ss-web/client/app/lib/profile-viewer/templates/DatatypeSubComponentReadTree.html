<tr pv-node  is-branch="hasRelevantChild(node)" node="node">
        <td class="col-xs-2 col-fixed-350"
            ng-class="{'name-concise-view concise-view':options.concise, 'expanded-view': !options.concise}">

             <span
                     tooltip-enable="options.concise"
                     tooltip-html="getComponentNodeName2(node)" tooltip-append-to-body="true"
                     tooltip-class="constraints-tooltip"
                     tooltip-trigger tooltip-animation="false" tooltip-placement="left">
                                    <span class="label label-sub-component label-icon">S</span>
<span>{{::getComponentNodeName2(node)}}</span>
                  </span>
        </td>
        <td class="col-xs-1 col-fixed-80">
            <div>
                <span>{{::node.usage}}</span>
				<span ng-repeat="p in node.selfPredicates">
					({{::p.trueUsage}}/{{::p.falseUsage}})
				</span>
            </div>
        </td>
        <td class="col-xs-1 col-fixed-100">
            <span ng-if="node.minLength || node.maxLength">[{{::node.minLength}},{{::node.maxLength}}]</span>
			<span ng-if="!node.minLength && !node.maxLength">[ ]</span>
        </td>

        <td class="col-xs-1 col-fixed-80">
            <a
                    tooltip-html="model.datatypes[node.datatype].id"
					class="point"
					ng-click="showDataType(model.datatypes[node.datatype].id)"
                    tooltip-append-to-body="true"
                    tooltip-class="constraints-tooltip"
                    ng-bind-html="model.datatypes[node.datatype].id" tooltip-trigger
                    tooltip-animation="false" tooltip-placement="left"></a>
        </td>

        <td class="col-xs-1 col-fixed-150">
            <div ng-if="(node.table != undefined  && node.table !== null)">
				<a ng-repeat="valueSet in getValueSet(node)" class="point valueset"
                   ng-click="showValueSetDefinition(valueSet)"
                   class="cs-concise-view concise-view"
                   tooltip-html="valueSet"
                   tooltip-append-to-body="true"
                   tooltip-class="constraints-tooltip"
                   ng-bind-html="valueSet"
                   tooltip-trigger tooltip-animation="false" tooltip-placement="left"></a>
			</div>
            <div ng-if="(node.selfValueSetBindings != undefined && node.selfValueSetBindings.length >0)">
                <span ng-repeat="vsb in getValueSetBindings(node)">
					<a ng-repeat="v in vsb.bindingList" class="point valueset"    
				   		ng-click="showValueSetDefinition(v.bindingIdentifier)"               
                   		class="cs-concise-view concise-view"
                   		tooltip-html="(v.isExternal? 'External Code Set <br>' : '') + ' ' +getValueSetBindingLocations(vsb)"
                   		tooltip-append-to-body="true"
                   		tooltip-class="constraints-tooltip"                
                   		tooltip-trigger tooltip-animation="false" tooltip-placement="left"> <i ng-if="v.isExternal" class="fa fa-link" aria-hidden="true"></i> {{v.bindingIdentifier}}</a>
				</span>
            </div>
			<div ng-if="(node.selfSingleCodeBindings != undefined && node.selfSingleCodeBindings.length >0)">
					<span ng-repeat="scb in getSingleCodes(node)">
						<span class="point valueset"                      
                       		class="cs-concise-view concise-view"
                       		tooltip-html="getSingleCodeBindingLocation(scb)"
                       		tooltip-append-to-body="true"
                       		tooltip-class="constraints-tooltip"
                       		ng-bind-html="getSingleCodeBindingText(scb)"
                       		tooltip-trigger tooltip-animation="false" tooltip-placement="left">
						</span>					
					</span>
            </div>
        </td>

        <td class="col-xs-2 col-predicate" ng-style="predWidth">
            <span class="predicate-concise-view concise-view" ng-if="options.concise"
                  tooltip-html="getPredicatesAsMultipleLinesString(node)"
                  tooltip-append-to-body="true"
                  tooltip-class="constraints-tooltip"
                  ng-bind-html="getPredicatesAsOneLineString(node)" tooltip-trigger
                  tooltip-animation="false" tooltip-placement="left"></span>
            <span ng-repeat="predicate in node.selfPredicates"
                  ng-if="!options.concise">
                <span class="expanded-view">
                    {{::predicate.description}}
                </span>
            </span>
        </td>
        <td class="col-xs-4 col-cs" ng-style="csWidth">
            <span class="cs-concise-view concise-view" ng-if="options.concise"
                  tooltip-html="getConfStatementsAsMultipleLinesString(node)"
                  tooltip-append-to-body="true"
                  tooltip-class="constraints-tooltip"
                  ng-bind-html="getConfStatementsAsOneLineString(node)"
                  tooltip-trigger tooltip-animation="false" tooltip-placement="left"></span>
            <span ng-repeat="confStatement in node.selfConformanceStatements"
                  ng-if="!options.concise">
                <span class="expanded-view">
                   {{::confStatement.constraintId}} : {{::confStatement.description}}
                </span>
            </span>
        </td>
    </tr>
