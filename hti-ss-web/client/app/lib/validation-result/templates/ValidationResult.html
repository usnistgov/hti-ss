<div ng-show="validationResult !== null">

    <ul class="nav nav-tabs">
      <li role="presentation" ng-if="settings.options.validation.show.errors"

          ng-class="{'active': currentType === 'errors'}"><a ng-click="showValidationTable(validationResult.errors.categories[0],'errors')"><span class="badge failure failure-errors"
                                                                 ng-bind="validationResult.errors.categories[0].data.length"></span>
        Errors</a>
      </li>
      <li
          ng-if="settings.options.validation.show.warnings" role="presentation" ng-class="{'active':currentType === 'warnings'}">
        <a ng-click="showValidationTable(validationResult.warnings.categories[0],'warnings')">    <span class="badge failure failure-warnings"
                              ng-bind="validationResult.warnings.categories[0].data.length"></span> Warnings</a></li>
      <li  active="active.alerts"
          ng-show="settings.options.validation.show.alerts" role="presentation" ng-class="{'active':currentType === 'alerts'}"><a
        ng-click="showValidationTable(validationResult.alerts.categories[0],'alerts')"> <span class="badge failure failure-alerts"
                        ng-bind="validationResult.alerts.categories[0].data.length"></span>
        Alerts
      </a>
      </li>
      <li
          active="active.affirmatives" ng-if="settings.options.validation.show.affirmatives" role="presentation"
          ng-class="{'active':currentType === 'affirmatives'}"><a ng-click="showValidationTable(validationResult.affirmatives.categories[0],'affirmatives')">      <span class="badge failure failure-affirmatives"
                                                                      ng-bind="validationResult.affirmatives.categories[0].data.length"></span>
        Affirmatives
      </a>
      </li>
	  <li
          active="active.informationals" ng-if="settings.options.validation.show.informationals" role="presentation"
          ng-class="{'active':currentType === 'informationals'}"><a ng-click="showValidationTable(validationResult.informationals.categories[0],'informationals')">      <span class="badge failure failure-informationals"
                                                                      ng-bind="validationResult.informationals.categories[0].data.length"></span>
        Informationals
      </a>
      </li>
		<li
          active="active.specerrors" ng-if="settings.options.validation.show.specerrors" role="presentation"
          ng-class="{'active':currentType === 'specerrors'}"><a ng-click="showValidationTable(validationResult.specerrors.categories[0],'specerrors')">      <span class="badge failure failure-specerrors"
                                                                      ng-bind="validationResult.specerrors.categories[0].data.length"></span>
        Spec Errors
      </a>
      </li>
    </ul>

    <div ng-show="currentType != null && currentType">
        <ul class="nav nav-tabs" ng-show="validationResult[currentType].categories.length > 1">
          <li role="presentation"   ng-repeat="category in validationResult[currentType].categories track by category.title"
              class="validation-result-subtab"
              ng-show="category.data.length > 0"
              ng-class="{'active': subActive[currentType][category.title]}"><a ng-click="showValidationTable(category,currentType)"> <span class="badge failure" ng-class="{'failure-errors': currentType === 'errors','failure-warnings': currentType === 'warnings','failure-alerts': currentType === 'alerts','failure-affirmatives': currentType === 'affirmatives'}" ng-bind="category.data.length"></span>
            {{category.title}}</a>
          </li>
        </ul>

      <div class="panel panel-default" ng-show="settings.options.validation.show[currentType]">
        <div class="panel-body container-validation-table">
          <div class="">
            <div validation-result-table></div>
          </div>
        </div>
      </div>

    </div>
